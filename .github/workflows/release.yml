name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Upgrade npm for trusted publishing support
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Create Release Pull Request or detect publish
        id: changesets
        uses: changesets/action@v1
        with:
          title: 'chore: version packages'
          commit: 'chore: version packages'
          version: pnpm version-packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm (trusted publishing)
        if: steps.changesets.outputs.hasChangesets == 'false'
        run: |
          echo "npm version: $(npm --version)"

          # Remove _authToken so npm uses OIDC instead of a token
          sed -i '/_authToken/d' "${NPM_CONFIG_USERCONFIG:-$HOME/.npmrc}" 2>/dev/null || true

          cd packages/test
          CURRENT=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view @srsholmes/tauri-playwright version 2>/dev/null || echo "0.0.0")
          if [ "$CURRENT" != "$PUBLISHED" ]; then
            echo "Publishing @srsholmes/tauri-playwright@$CURRENT"
            npm publish --provenance --access public
          else
            echo "Version $CURRENT already published, skipping"
          fi

      - name: Publish to crates.io
        if: steps.changesets.outputs.hasChangesets == 'false'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cd packages/plugin
          CURRENT=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          PUBLISHED=$(cargo search tauri-plugin-playwright --limit 1 2>/dev/null | grep '^tauri-plugin-playwright' | sed 's/.*= "\(.*\)".*/\1/' || echo "0.0.0")
          if [ "$CURRENT" != "$PUBLISHED" ]; then
            echo "Publishing tauri-plugin-playwright@$CURRENT"
            cargo publish --no-verify
          else
            echo "Version $CURRENT already published, skipping"
          fi
